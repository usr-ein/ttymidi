name: build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  arm-static:
    # Native arm64 runner: builds linux/arm64 without QEMU emulation.
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      # Pure-logic + end-to-end tests need no ALSA, so they run natively here
      # and gate the ARM build.
      - name: Run tests
        run: make test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static ARM binary
        run: make docker-arm

      - name: Verify artifact
        run: file dist/ttymidi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: ttymidi-arm64
          path: dist/ttymidi
          if-no-files-found: error
