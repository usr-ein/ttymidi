name: release

# Push a tag (e.g. `git tag v0.61 && git push origin v0.61`) to build the
# static ARM binary and publish a GitHub Release with it attached.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # needed to create the release

jobs:
  release:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Run tests
        run: make test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build static ARM binary
        run: make docker-arm

      - name: Package binary
        run: cp dist/ttymidi ttymidi-linux-arm64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}"
          ttymidi-linux-arm64
          --title "${{ github.ref_name }}"
          --generate-notes
